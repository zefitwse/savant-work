version: "3.9"

services:
  frigate:
    image: ghcr.io/blakeblackshear/frigate:stable
    container_name: frigate
    privileged: true
    restart: unless-stopped
    shm_size: "256mb"
    volumes:
      - ./config/config.yml:/config/config.yml:ro
      - ./storage:/media/frigate
      - /etc/localtime:/etc/localtime:ro
    tmpfs:
      - /tmp/cache
    ports:
      - "5000:5000"
      - "8554:8554"
      - "8555:8555"
      - "1984:1984"
    # 짼쨩횎쨔횙횄 GPU짙짢횘챵횓짧횆찾쨉횆쨉챌횆횚쩔횋횆횥횄쨩횙횖짙짤
    # 횊챌쨔청횎쨔횙횄 GPU짙짭횊징횕청횕횂횄챈횞짖횎횒
    # runtime: nvidia
    # devices:
    #   - /dev/dri:/dev/dri               # Intel GPU
    #   - /dev/nvidia0:/dev/nvidia0       # NVIDIA GPU
    
    environment:
      - FRIGATE_RTSP_PASSWORD=password   # RTSP 횊횕횜짚횄횥횂챘
      # - NVIDIA_VISIBLE_DEVICES=all     # GPU 횕횪쨔횠짙짢횊챌횙횖짙짤